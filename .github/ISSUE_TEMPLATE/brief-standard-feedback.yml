name: Brief standard feedback
description: Suggest a public-safe improvement to the LMD Decision Brief v1.0 standard.
title: "Brief standard feedback: "
labels: ["brief-standard", "public-safe-review"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include confidential employer/customer data or safety-critical approval requests.
  - type: input
    id: affected_page
    attributes:
      label: Affected page
      placeholder: https://manishsharma.dev/brief-standard/
    validations:
      required: true
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - Standard wording
        - JSON schema
        - Public example
        - Adoption copy
        - Boundary wording
        - Other public-safe feedback
    validations:
      required: true
  - type: textarea
    id: public_source
    attributes:
      label: Public source, if any
      description: Add only public URLs or public-safe context. Do not paste confidential material.
  - type: textarea
    id: unclear
    attributes:
      label: What is unclear?
      description: Describe the confusing field, boundary, example, or workflow step.
    validations:
      required: true
  - type: textarea
    id: suggested_correction
    attributes:
      label: Suggested correction
      description: Suggest public-safe wording or structure.
    validations:
      required: true
  - type: textarea
    id: boundary_risk
    attributes:
      label: Boundary risk
      description: Note any approval, certification, feasibility, quality, Exafuse/customer, or confidentiality risk.
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary check
      options:
        - label: This does not include confidential employer/customer data.
          required: true
        - label: This does not request engineering approval, certification, release, safety-critical acceptance, or a quality guarantee.
          required: true
