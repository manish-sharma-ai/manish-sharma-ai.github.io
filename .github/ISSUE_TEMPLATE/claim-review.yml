name: Claim review
description: Request review of a public claim, source status, or limitation wording.
title: "Claim review: "
labels: ["claim-review", "source-review"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include confidential employer/customer data or safety-critical approval requests.
  - type: input
    id: affected_page
    attributes:
      label: Affected page
      placeholder: https://manishsharma.dev/claims/
    validations:
      required: true
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - Source status
        - Claim wording
        - Limitation wording
        - Allowed page
        - Boundary risk
        - Other public-safe claim issue
    validations:
      required: true
  - type: textarea
    id: public_source
    attributes:
      label: Public source, if any
      description: Add only public URLs or public-safe notes. Do not paste confidential material.
  - type: textarea
    id: unclear
    attributes:
      label: What is unclear?
      description: Identify the claim, source status, limitation, or page context that needs review.
    validations:
      required: true
  - type: textarea
    id: suggested_correction
    attributes:
      label: Suggested correction
      description: Suggest public-safe wording, source status, or limitation language.
    validations:
      required: true
  - type: textarea
    id: boundary_risk
    attributes:
      label: Boundary risk
      description: Note any approval, certification, feasibility, quality, Exafuse/customer, or confidentiality risk.
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary check
      options:
        - label: This does not include confidential employer/customer data.
          required: true
        - label: This does not ask the site to guarantee feasibility, quality, certification, or release.
          required: true
