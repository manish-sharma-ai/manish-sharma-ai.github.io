name: Boundary risk
description: Flag wording that may overclaim AI, monitoring, feasibility, quality, or Exafuse/customer involvement.
title: "Boundary risk: "
labels: ["boundary-risk", "claim-review"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include confidential employer/customer data or safety-critical approval requests.
  - type: input
    id: affected_page
    attributes:
      label: Affected page
      placeholder: https://manishsharma.dev/no-hype/
    validations:
      required: true
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - AI/process monitoring overclaim
        - Feasibility or repairability overclaim
        - Approval/certification/release implication
        - Confidentiality risk
        - Exafuse/customer involvement ambiguity
        - Other public-safe boundary risk
    validations:
      required: true
  - type: textarea
    id: public_source
    attributes:
      label: Public source, if any
      description: Add only public URLs or public-safe context. Do not paste confidential material.
  - type: textarea
    id: unclear
    attributes:
      label: What is unclear?
      description: Quote or describe the public wording that may need a boundary fix.
    validations:
      required: true
  - type: textarea
    id: suggested_correction
    attributes:
      label: Suggested correction
      description: Suggest public-safe replacement wording.
    validations:
      required: true
  - type: textarea
    id: boundary_risk
    attributes:
      label: Boundary risk
      description: Explain the approval, certification, feasibility, quality, Exafuse/customer, or confidentiality risk.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary check
      options:
        - label: This does not include confidential employer/customer data.
          required: true
        - label: This does not request engineering approval, certification, release, safety-critical acceptance, or a quality guarantee.
          required: true
