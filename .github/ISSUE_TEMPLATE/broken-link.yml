name: Broken link
description: Report a broken route, missing public file, or incorrect link label.
title: "Broken link: "
labels: ["broken-link", "site-quality"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include confidential employer/customer data or safety-critical approval requests.
  - type: input
    id: source_page
    attributes:
      label: Page containing the link
      placeholder: https://manish-sharma-ai.github.io/...
    validations:
      required: true
  - type: input
    id: broken_target
    attributes:
      label: Broken or incorrect target
      placeholder: URL or path
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should the link do instead?
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary check
      options:
        - label: This report contains only public-safe link information.
          required: true
