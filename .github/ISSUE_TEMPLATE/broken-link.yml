name: Broken link
description: Report a broken route, missing public file, or incorrect link label.
title: "Broken link: "
labels: ["broken-link", "site-quality"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include confidential employer/customer data or safety-critical approval requests.
  - type: input
    id: affected_page
    attributes:
      label: Affected page
      placeholder: https://manishsharma.dev/...
    validations:
      required: true
  - type: input
    id: broken_target
    attributes:
      label: Broken or incorrect target
      placeholder: URL or path
    validations:
      required: true
  - type: textarea
    id: public_source
    attributes:
      label: Public source, if any
      description: Add only public URLs or public-safe context. Do not paste confidential material.
  - type: textarea
    id: unclear
    attributes:
      label: What is unclear?
      description: Explain whether the target, label, status, or expected behavior is unclear.
    validations:
      required: true
  - type: textarea
    id: suggested_correction
    attributes:
      label: Suggested correction
      description: What should the link do or say instead?
    validations:
      required: true
  - type: textarea
    id: boundary_risk
    attributes:
      label: Boundary risk
      description: Note any approval, certification, feasibility, quality, Exafuse/customer, or confidentiality risk.
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary check
      options:
        - label: This does not include confidential employer/customer data.
          required: true
        - label: This report contains only public-safe link information.
          required: true
