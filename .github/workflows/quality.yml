name: Repository quality gates

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:security

      - name: Type and content checks
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Release audits
        run: npm run audit:all

      - name: Diff hygiene
        run: git diff --check
